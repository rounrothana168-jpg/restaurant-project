<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h3 class="flex items-center w-full">
    <span class="flex-grow bg-gray-200 rounded h-1"></span>
    <span class="mx-3 text-lg font-medium">End</span>
    <span class="flex-grow bg-gray-200 rounded h-1"></span>
    </h3>

    <h3 class="flex items-center w-full my-4">
    <span class="flex-grow h-px bg-gradient-to-r from-transparent to-gray-400 dark:to-white"></span>
    <span class="mx-4 px-4 py-1 text-sm font-semibold tracking-widest uppercase bg-gray-100 dark:bg-gray-700 dark:text-white text-gray-600 rounded-full border border-gray-300 dark:border-gray-500">Food</span>
    <span class="flex-grow h-px bg-gradient-to-l from-transparent to-gray-400 dark:to-white"></span>
</h3>

<h3 class="flex items-center w-full my-4">
    <span class="flex-grow h-0.5 bg-gradient-to-r from-transparent to-green-400"></span>
    <span class="mx-4 flex items-center gap-2 px-4 py-1 text-sm font-bold tracking-wide uppercase text-green-600 dark:text-green-400">
        Food
    </span>
    <span class="flex-grow h-0.5 bg-gradient-to-l from-transparent to-green-400"></span>
</h3>

<h3 class="flex items-center gap-3 w-full my-4">
    <span class="w-1.5 h-6 bg-green-500 rounded-full"></span>
    <span class="text-lg font-bold uppercase tracking-widest text-gray-700 dark:text-white">Food</span>
    <span class="flex-grow h-px bg-gray-200 dark:bg-gray-600"></span>
</h3>
</body>
</html>
